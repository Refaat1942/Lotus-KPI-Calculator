<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Lotus KPI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
  <div class="login-container animate-fade">
    <div class="login-logo">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Lotus Pharmacies" class="login-brand-logo">
    </div>
    <h1 class="login-title">KPI CALCULATOR SYSTEM</h1>
    <div class="login-progress"><span></span></div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="flash flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form class="login-form card" method="post" action="{{ url_for('login', next=request.args.get('next')) }}">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autofocus placeholder="admin">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="••••••">

      <button type="submit" class="btn btn-green btn-block">Sign In</button>
    </form>

    <p class="login-copy">Copyright Lotus Pharmacies 2026</p>
  </div>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
